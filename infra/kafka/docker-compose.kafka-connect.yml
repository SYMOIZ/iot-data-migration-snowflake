# Deployed on the Kafka Connect EC2 instance (i-08cc1464acf2828a2) at
# /opt/kafka-connect/docker-compose.yml. See TASK_KAFKA_CONNECT_SETUP.md for
# config/connect-distributed.properties and TASK_SNOWFLAKE_CONNECTOR_SETUP.md
# for why this now builds a custom image (Dockerfile.kafka-connect) instead of
# using apache/kafka:4.0.2 directly - the Snowflake Kafka Connector's native
# streaming client requires glibc, which the Alpine-based apache/kafka image
# doesn't provide.
services:
  kafka-connect:
    build:
      context: .
      dockerfile: Dockerfile.kafka-connect
    image: iot-hackathon-kafka-connect:glibc-fix2
    container_name: kafka-connect
    restart: unless-stopped
    network_mode: host
    entrypoint: ["/opt/kafka/bin/connect-distributed.sh"]
    command: ["/mnt/config/connect-distributed.properties"]
    volumes:
      - ./config:/mnt/config
      - kafka-connect-plugins:/opt/kafka-connect/plugins
      - kafka-connect-data:/opt/kafka/logs
volumes:
  kafka-connect-plugins:
  kafka-connect-data:
