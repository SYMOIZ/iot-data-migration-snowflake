version: 2

models:
  - name: gold_latest_device_status
    description: >
      Gold: one row per device with its most recent telemetry reading and
      a derived battery status flag, for a live fleet-status dashboard.
    columns:
      - name: device_id
        description: Simulated IoT device identifier.
        tests:
          - not_null
          - unique
      - name: last_seen_at
        description: Timestamp of the device's most recent reading.
        tests:
          - not_null
      - name: battery_status
        description: Derived battery health bucket.
        tests:
          - not_null
          - accepted_values:
              arguments:
                values: ['low', 'medium', 'ok']

  - name: gold_avg_temperature_by_device
    description: "Gold: average/min/max temperature per device, all-time."
    columns:
      - name: device_id
        tests:
          - not_null
          - unique
      - name: avg_temperature
        tests:
          - not_null

  - name: gold_avg_heart_rate_by_device
    description: "Gold: average/min/max heart rate per device, all-time."
    columns:
      - name: device_id
        tests:
          - not_null
          - unique
      - name: avg_heart_rate
        tests:
          - not_null

  - name: gold_battery_health_summary
    description: >
      Gold: fleet-wide count and average battery level by battery status
      bucket (low/medium/ok), based on each device's latest reading.
    columns:
      - name: battery_status
        tests:
          - not_null
          - unique
          - accepted_values:
              arguments:
                values: ['low', 'medium', 'ok']
      - name: device_count
        tests:
          - not_null

  - name: gold_daily_telemetry_summary
    description: "Gold: fleet-wide telemetry rollup per calendar day."
    columns:
      - name: event_date
        description: Calendar day (truncated timestamp) of the rollup.
        tests:
          - not_null
          - unique
      - name: reading_count
        tests:
          - not_null
      - name: active_device_count
        tests:
          - not_null

  - name: gold_recent_cdc_events
    description: >
      Gold: row-level CDC event feed (one row per Debezium event), most
      recent first. The only event-granularity Gold model - backs the
      Operations "Latest CDC Events" view and the Raw Data Explorer.
    columns:
      - name: event_id
        description: PostgreSQL primary key of the source iot_events row.
        tests:
          - not_null
      - name: device_id
        tests:
          - not_null
      - name: operation
        description: Debezium CDC operation code.
        tests:
          - not_null
          - accepted_values:
              arguments:
                values: ['c', 'r', 'u', 'd']
      - name: event_timestamp
        tests:
          - not_null
