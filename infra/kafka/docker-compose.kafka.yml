# Deployed on the Kafka broker EC2 instance (<KAFKA_BROKER_INSTANCE_ID>) at /opt/kafka/docker-compose.yml.
# ${PRIVATE_IP} is resolved from instance metadata at deploy time - see docs/deployment/06-kafka-broker.md
# for the full deployment script. Kept here as the source-of-truth reference copy.
services:
  kafka:
    image: apache/kafka:4.0.2
    container_name: kafka
    restart: unless-stopped
    network_mode: host
    environment:
      KAFKA_PROCESS_ROLES: "broker,controller"
      KAFKA_NODE_ID: "1"
      KAFKA_CONTROLLER_QUORUM_VOTERS: "1@127.0.0.1:9093"
      KAFKA_LISTENERS: "PLAINTEXT://0.0.0.0:9092,CONTROLLER://127.0.0.1:9093"
      KAFKA_ADVERTISED_LISTENERS: "PLAINTEXT://${PRIVATE_IP}:9092"
      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: "CONTROLLER:PLAINTEXT,PLAINTEXT:PLAINTEXT"
      KAFKA_CONTROLLER_LISTENER_NAMES: "CONTROLLER"
      KAFKA_LOG_DIRS: "/var/lib/kafka/data"
      KAFKA_AUTO_CREATE_TOPICS_ENABLE: "false"
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: "1"
      KAFKA_DEFAULT_REPLICATION_FACTOR: "1"
      KAFKA_NUM_PARTITIONS: "3"
    volumes:
      - kafka-data:/var/lib/kafka/data
volumes:
  kafka-data:
